<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#13181f"/>
    </linearGradient>
    <filter id="cglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="cdown" markerWidth="12" markerHeight="12" refX="5" refY="9" orient="auto">
      <path d="M1,1 L5,9 L9,1" fill="none" stroke="#8b5a4a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="cgo" markerWidth="13" markerHeight="13" refX="9" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#cbg)"/>
  <rect x="1" y="1" width="1198" height="698" rx="12" fill="none" stroke="#30363d"/>

  <!-- header -->
  <text x="40" y="52" fill="#e6edf3" font-size="27" font-weight="800">Why not ChromaDB?</text>
  <text x="40" y="80" fill="#8b949e" font-size="15">One dependency, five ways it collapses on Python 3.14 &#8212; so we route around it.</text>

  <!-- column titles -->
  <g transform="translate(40,108)">
    <rect width="150" height="28" rx="14" fill="#2a1416" stroke="#da3633"/>
    <circle cx="20" cy="14" r="5" fill="#f85149"/>
    <text x="34" y="19" fill="#f85149" font-size="13" font-weight="800" letter-spacing="1">THE COLLAPSE</text>
  </g>
  <text x="200" y="127" fill="#6e7681" font-size="13">pip install chromadb</text>

  <g transform="translate(660,108)">
    <rect width="178" height="28" rx="14" fill="#0f1f14" stroke="#2ea043"/>
    <circle cx="20" cy="14" r="5" fill="#3fb950"/>
    <text x="34" y="19" fill="#3fb950" font-size="13" font-weight="800" letter-spacing="1">THE DETOUR &#183; memory.py</text>
  </g>
  <text x="848" y="127" fill="#6e7681" font-size="13">~40 lines</text>

  <!-- ================= LEFT: falling dominoes ================= -->
  <!-- each card: number badge, title, subtitle; red intensity ramps down -->
  <!-- step 1 -->
  <g transform="translate(48,150) rotate(-1)">
    <rect width="500" height="62" rx="11" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="34" cy="31" r="17" fill="#0d2136" stroke="#58a6ff"/><text x="34" y="36" text-anchor="middle" fill="#58a6ff" font-size="15" font-weight="800">1</text>
    <text x="66" y="27" fill="#e6edf3" font-size="16" font-weight="700">Python 3.14 is brand new</text>
    <text x="66" y="48" fill="#8b949e" font-size="13">most of the dep tree has no cp314 wheels</text>
  </g>
  <line x1="298" y1="214" x2="298" y2="232" stroke="#8b5a4a" stroke-width="2.2" marker-end="url(#cdown)"/>
  <!-- step 2 -->
  <g transform="translate(48,234) rotate(-1.6)">
    <rect width="500" height="62" rx="11" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
    <circle cx="34" cy="31" r="17" fill="#2a1a0f" stroke="#f0883e"/><text x="34" y="36" text-anchor="middle" fill="#f0883e" font-size="15" font-weight="800">2</text>
    <text x="66" y="27" fill="#e6edf3" font-size="16" font-weight="700">pip backtracks</text>
    <text x="66" y="48" fill="#8b949e" font-size="13">older chromadb releases &#8594; depend on pandas</text>
  </g>
  <line x1="298" y1="298" x2="298" y2="316" stroke="#8b5a4a" stroke-width="2.2" marker-end="url(#cdown)"/>
  <!-- step 3 -->
  <g transform="translate(48,318) rotate(-2.2)">
    <rect width="500" height="62" rx="11" fill="#161b22" stroke="#fb6b4b" stroke-width="2"/>
    <circle cx="34" cy="31" r="17" fill="#2a140f" stroke="#fb6b4b"/><text x="34" y="36" text-anchor="middle" fill="#fb6b4b" font-size="15" font-weight="800">3</text>
    <text x="66" y="27" fill="#e6edf3" font-size="16" font-weight="700">pandas has no 3.14 wheel</text>
    <text x="66" y="48" fill="#8b949e" font-size="13">pip falls back to building it from source</text>
  </g>
  <line x1="298" y1="382" x2="298" y2="400" stroke="#8b5a4a" stroke-width="2.2" marker-end="url(#cdown)"/>
  <!-- step 4 -->
  <g transform="translate(48,402) rotate(-2.8)">
    <rect width="500" height="62" rx="11" fill="#161b22" stroke="#f85149" stroke-width="2"/>
    <circle cx="34" cy="31" r="17" fill="#2a1011" stroke="#f85149"/><text x="34" y="36" text-anchor="middle" fill="#f85149" font-size="15" font-weight="800">4</text>
    <text x="66" y="27" fill="#e6edf3" font-size="16" font-weight="700">no module 'pkg_resources'</text>
    <text x="66" y="48" fill="#8b949e" font-size="13">setuptools 81+ removed it &#183; this env has 82</text>
  </g>
  <line x1="298" y1="466" x2="298" y2="484" stroke="#8b5a4a" stroke-width="2.2" marker-end="url(#cdown)"/>
  <!-- step 5 -->
  <g transform="translate(48,486) rotate(-3.4)">
    <rect width="500" height="62" rx="11" fill="#161b22" stroke="#da3633" stroke-width="2"/>
    <circle cx="34" cy="31" r="17" fill="#2a0d0e" stroke="#da3633"/><text x="34" y="36" text-anchor="middle" fill="#da3633" font-size="15" font-weight="800">5</text>
    <text x="66" y="27" fill="#e6edf3" font-size="16" font-weight="700">build isolation seals it</text>
    <text x="66" y="48" fill="#8b949e" font-size="13">PEP 517 sandbox &#8594; your setuptools fix can't reach in</text>
  </g>
  <line x1="298" y1="550" x2="298" y2="572" stroke="#da3633" stroke-width="2.2" marker-end="url(#cdown)"/>
  <!-- BUILD FAILS -->
  <g transform="translate(120,576)">
    <rect width="356" height="62" rx="11" fill="#2a0d0e" stroke="#f85149" stroke-width="2.5" filter="url(#cglow)"/>
    <g transform="translate(34,31)" stroke="#f85149" stroke-width="3.5" stroke-linecap="round">
      <line x1="-10" y1="-10" x2="10" y2="10"/><line x1="10" y1="-10" x2="-10" y2="10"/>
    </g>
    <text x="62" y="28" fill="#f85149" font-size="17" font-weight="800">BUILD FAILS</text>
    <text x="62" y="49" fill="#c9a0a0" font-size="13">Failed to build 'pandas' &#183; install aborts</text>
  </g>

  <!-- route-around connector -->
  <path d="M476,607 C560,607 560,300 648,300" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#cgo)"/>
  <text x="540" y="455" fill="#3fb950" font-size="12.5" font-weight="700" transform="rotate(90 540 455)">route around it</text>

  <!-- ================= RIGHT: the detour ================= -->
  <g transform="translate(648,170)">
    <rect width="500" height="70" rx="11" fill="#101a12" stroke="#2ea043" stroke-width="2"/>
    <text x="24" y="30" fill="#3fb950" font-size="16" font-weight="800">embed</text>
    <text x="24" y="54" fill="#c9d1d9" font-size="13.5">ollama &#183; nomic-embed-text &#8594; 768-float vector</text>
  </g>
  <line x1="898" y1="240" x2="898" y2="262" stroke="#2ea043" stroke-width="2.2" marker-end="url(#cgo)"/>
  <g transform="translate(648,264)">
    <rect width="500" height="70" rx="11" fill="#101a12" stroke="#2ea043" stroke-width="2"/>
    <text x="24" y="30" fill="#3fb950" font-size="16" font-weight="800">store</text>
    <text x="24" y="54" fill="#c9d1d9" font-size="13.5">list of {text, vector} &#8594; weather_memory.json</text>
  </g>
  <line x1="898" y1="334" x2="898" y2="356" stroke="#2ea043" stroke-width="2.2" marker-end="url(#cgo)"/>
  <g transform="translate(648,358)">
    <rect width="500" height="70" rx="11" fill="#101a12" stroke="#2ea043" stroke-width="2"/>
    <text x="24" y="30" fill="#3fb950" font-size="16" font-weight="800">search</text>
    <text x="24" y="54" fill="#c9d1d9" font-size="13.5">cosine over all vectors &#8594; top-k relevant turns</text>
  </g>
  <line x1="898" y1="428" x2="898" y2="450" stroke="#2ea043" stroke-width="2.2" marker-end="url(#cgo)"/>
  <!-- outcome -->
  <g transform="translate(648,452)">
    <rect width="500" height="76" rx="11" fill="#0f2418" stroke="#3fb950" stroke-width="2.5" filter="url(#cglow)"/>
    <g transform="translate(34,38)" stroke="#3fb950" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-11,1 L-3,10 L12,-9"/>
    </g>
    <text x="62" y="33" fill="#3fb950" font-size="17" font-weight="800">Identical behaviour</text>
    <text x="62" y="55" fill="#9fd6ad" font-size="13.5">same save/recall API &#183; deps stay: ollama + requests</text>
  </g>

  <!-- trade-off footnote -->
  <g transform="translate(648,548)">
    <rect width="500" height="118" rx="11" fill="#11161d" stroke="#30363d"/>
    <text x="22" y="30" fill="#8b949e" font-size="13" font-weight="700">HONEST TRADE-OFF</text>
    <text x="22" y="56" fill="#c9d1d9" font-size="13.5">O(n) linear cosine scan in pure Python.</text>
    <text x="22" y="78" fill="#8b949e" font-size="13">Perfect for the hundreds&#8211;thousands of turns a</text>
    <text x="22" y="96" fill="#8b949e" font-size="13">personal agent keeps. ChromaDB's HNSW index is</text>
    <text x="22" y="114" fill="#8b949e" font-size="13">for millions &#8212; revisit at ~10k+ entries.</text>
  </g>
</svg>
