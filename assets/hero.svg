<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" width="1280" height="380" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="55%" stop-color="#f7b955"/>
      <stop offset="100%" stop-color="#d97757"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7c59f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="380" fill="url(#bg)"/>
  <rect width="1280" height="380" fill="none" stroke="#30363d" stroke-width="2" rx="10"/>

  <!-- starfield dots -->
  <g fill="#30363d">
    <circle cx="980" cy="60" r="2"/><circle cx="1090" cy="120" r="1.5"/>
    <circle cx="1180" cy="80" r="2"/><circle cx="1210" cy="180" r="1.5"/>
    <circle cx="900" cy="150" r="1.5"/><circle cx="1140" cy="240" r="2"/>
  </g>

  <!-- ☀ sun with rotating rays -->
  <g transform="translate(210,165)">
    <g stroke="#f7b955" stroke-width="5" stroke-linecap="round" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
      <line x1="0" y1="-92" x2="0" y2="-72"/><line x1="0" y1="72" x2="0" y2="92"/>
      <line x1="-92" y1="0" x2="-72" y2="0"/><line x1="72" y1="0" x2="92" y2="0"/>
      <line x1="-65" y1="-65" x2="-51" y2="-51"/><line x1="51" y1="51" x2="65" y2="65"/>
      <line x1="65" y1="-65" x2="51" y2="-51"/><line x1="-51" y1="51" x2="-65" y2="65"/>
    </g>
    <circle r="58" fill="url(#sun)" filter="url(#glow)"/>
  </g>

  <!-- drifting cloud -->
  <g fill="#c9d1d9">
    <g transform="translate(250,235)">
      <animateTransform attributeName="transform" type="translate" values="250,235; 270,235; 250,235" dur="9s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="60" ry="30"/>
      <circle cx="-38" cy="6" r="26"/><circle cx="38" cy="6" r="30"/><circle cx="0" cy="-16" r="32"/>
      <rect x="-62" y="0" width="124" height="28" rx="14"/>
    </g>
  </g>
  <!-- rain -->
  <g stroke="#58a6ff" stroke-width="3" stroke-linecap="round">
    <line x1="225" y1="285" x2="219" y2="305"><animate attributeName="opacity" values="0;1;0" dur="1.3s" repeatCount="indefinite"/></line>
    <line x1="255" y1="290" x2="249" y2="312"><animate attributeName="opacity" values="0;1;0" dur="1.1s" begin="0.3s" repeatCount="indefinite"/></line>
    <line x1="285" y1="285" x2="279" y2="306"><animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.6s" repeatCount="indefinite"/></line>
  </g>

  <!-- title block -->
  <text x="430" y="135" font-size="62" font-weight="800" fill="url(#title)" letter-spacing="1">LOCAL WEATHER</text>
  <text x="430" y="200" font-size="62" font-weight="800" fill="url(#title)" letter-spacing="1">AGENT</text>
  <text x="436" y="240" font-size="23" fill="#8b949e">grounded &#183; verified &#183; fully local</text>

  <!-- PGVR chip -->
  <g transform="translate(436,262)">
    <rect width="318" height="34" rx="17" fill="#1f2937" stroke="#d97757" stroke-width="1.5"/>
    <circle cx="22" cy="17" r="6" fill="#d97757"/>
    <text x="40" y="23" font-size="16" font-weight="700" fill="#f7c59f" letter-spacing="2">PARAMETERIZE → GROUND → VERIFY → REFINE</text>
  </g>

  <!-- right stat card -->
  <g transform="translate(980,120)">
    <rect width="240" height="150" rx="14" fill="#161b22" stroke="#30363d"/>
    <text x="20" y="40" font-size="15" fill="#8b949e">model</text>
    <text x="20" y="66" font-size="22" font-weight="700" fill="#e6edf3">qwen3.5:0.8b</text>
    <text x="20" y="96" font-size="15" fill="#8b949e">data</text>
    <text x="20" y="122" font-size="22" font-weight="700" fill="#3fb950">Open-Meteo</text>
    <text x="178" y="40" font-size="15" fill="#8b949e">~1GB</text>
    <text x="150" y="122" font-size="14" fill="#8b949e">no API key</text>
  </g>

  <!-- footer rule -->
  <line x1="40" y1="338" x2="1240" y2="338" stroke="#30363d"/>
  <text x="40" y="362" font-size="14" fill="#6e7681">A small local model that knows when it's wrong &#8212; and corrects itself.</text>
</svg>
